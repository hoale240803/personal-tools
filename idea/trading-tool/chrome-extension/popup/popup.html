<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bitcoin Signal Tracker</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <div class="header">
        <h1>🚀 Bitcoin Signal</h1>
        <p class="subtitle">Real-time Detection</p>
      </div>

      <!-- Current Signal Display -->
      <div class="signal-display" id="signalDisplay">
        <div class="signal-status unknown">
          <span class="signal-text">⏳ Detecting...</span>
        </div>
        <p class="last-updated" id="lastUpdated">---</p>
      </div>

      <!-- Controls -->
      <div class="controls">
        <button id="pauseBtn" class="btn btn-primary" title="Pause monitoring">
          ⏸ Pause
        </button>
        <button id="refreshBtn" class="btn btn-secondary" title="Refresh now">
          🔄 Refresh
        </button>
      </div>

      <!-- History -->
      <div class="history-section">
        <h3>📋 Recent Activity</h3>
        <div class="history-list" id="historyList">
          <p class="empty">No history yet...</p>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-section">
        <div class="stat">
          <span class="stat-label">Long Signals:</span>
          <span class="stat-value" id="longCount">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Short Signals:</span>
          <span class="stat-value" id="shortCount">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Neutral Signals:</span>
          <span class="stat-value" id="neutralCount">0</span>
        </div>
      </div>

      <!-- Footer -->
      <div class="footer">
        <p>Monitoring: <span id="monitoringStatus">Checking...</span></p>
        <p class="version">v1.0.0</p>
      </div>
    </div>

    <script src="../utils.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
